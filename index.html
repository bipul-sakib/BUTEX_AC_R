<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTEX Affiliated Result Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); }
        .animate-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-3xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-slate-800 mb-1">Result Portal</h1>
            <p class="text-slate-500 font-medium text-sm">Affiliated Colleges of Bangladesh University of Textiles</p>
        </div>

        <div class="glass p-4 rounded-2xl shadow-lg flex flex-col md:flex-row gap-3 mb-8">
            <input type="text" id="rollInput" placeholder="Enter 10 or 11 Digit Roll Number..." 
                class="flex-1 px-5 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 font-semibold text-lg">
            <button onclick="searchResult()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold transition-all active:scale-95">
                Search Result
            </button>
        </div>

        <div id="resultBox" class="hidden animate-up">
            <div class="glass rounded-2xl shadow-xl overflow-hidden mb-6">
                <div class="bg-slate-800 p-6 text-white flex justify-between items-center">
                    <div>
                        <h2 id="dispName" class="text-xl font-bold uppercase tracking-tight">---</h2>
                        <p id="dispRoll" class="text-slate-400 text-sm font-mono"></p>
                    </div>
                    <div id="dispBatch" class="text-xs bg-slate-700 px-3 py-1 rounded-full font-bold uppercase tracking-wider">Batch --</div>
                </div>

                <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6 border-b border-slate-100">
                    <div class="space-y-4">
                        <div>
                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-1">College Name</p>
                            <p id="dispCollege" class="font-bold text-slate-700 leading-tight">---</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mb-1">Academic Department</p>
                            <p id="dispDept" class="font-bold text-slate-700 leading-tight">---</p>
                        </div>
                    </div>
                    <div class="bg-blue-50 rounded-xl p-5 flex flex-col items-center justify-center border border-blue-100 shadow-inner">
                        <p class="text-[10px] text-blue-600 uppercase font-bold mb-1 tracking-wider">Accumulated CGPA</p>
                        <p id="dispCGPA" class="text-4xl font-black text-blue-900 tracking-tighter italic">0.00</p>
                    </div>
                </div>
            </div>

            <div class="glass rounded-2xl shadow-lg overflow-hidden border border-slate-100">
                <div class="px-6 py-4 bg-slate-50 border-b border-slate-100 font-bold text-slate-700 text-sm flex items-center gap-2">
                    <span>📊</span> Academic Performance History
                </div>
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-slate-400 font-bold uppercase text-[10px] tracking-widest border-b border-slate-50">
                            <th class="px-6 py-4 text-left">Level & Term</th>
                            <th class="px-6 py-4 text-center">Term GPA</th>
                            <th class="px-6 py-4 text-right">Academic Status</th>
                        </tr>
                    </thead>
                    <tbody id="resTableBody" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="errorMsg" class="hidden text-center mt-10">
            <div class="inline-block bg-red-50 text-red-600 px-8 py-4 rounded-xl font-bold border border-red-100 shadow-sm">
                ⚠️ Record not found in our result database!
            </div>
        </div>
    </div>

    <script>
        let db = {};

        // Load the JSON database from GitHub
        fetch('data.json')
            .then(response => response.json())
            .then(data => { 
                db = data; 
                console.log("Success: Database synced with " + Object.keys(db).length + " student records.");
            })
            .catch(error => {
                console.error("Critical Error: Database file (data.json) could not be reached.");
            });

        function searchResult() {
            const input = document.getElementById('rollInput').value.trim().toUpperCase();
            const box = document.getElementById('resultBox');
            const err = document.getElementById('errorMsg');
            const tbody = document.getElementById('resTableBody');

            // Check if Roll exists in the database
            if (db[input]) {
                const student = db[input];
                
                // Populate Profile Data [cite: 7, 22, 54]
                document.getElementById('dispName').innerText = student.name || "Student Profile Not Linked";
                document.getElementById('dispRoll').innerText = input;
                document.getElementById('dispBatch').innerText = "Batch " + (student.batch || "--");
                document.getElementById('dispCollege').innerText = student.college || "Information Not Available";
                document.getElementById('dispDept').innerText = (student.dept || "Engineering") + " Engineering";
                
                // Display CGPA from precise PDF scraping [cite: 8, 11, 21, 55]
                document.getElementById('dispCGPA').innerText = student.cgpa ? student.cgpa.toFixed(2) : "0.00";

                // Populate Result History Table [cite: 8, 18, 59, 63]
                tbody.innerHTML = "";
                if(student.results) {
                    // Sorting terms chronologically (L1T1, L1T2, etc.)
                    const terms = Object.keys(student.results).sort();
                    terms.forEach(term => {
                        const termGPA = parseFloat(student.results[term]);
                        tbody.innerHTML += `
                            <tr class="hover:bg-blue-50/50 transition-all duration-200">
                                <td class="px-6 py-5 font-bold text-slate-700">${term}</td>
                                <td class="px-6 py-5 text-center font-black text-blue-600 text-lg">${termGPA.toFixed(2)}</td>
                                <td class="px-6 py-5 text-right">
                                    <span class="bg-green-100 text-green-700 text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-tighter">Published</span>
                                </td>
                            </tr>`;
                    });
                }

                // Show the result box and hide errors
                box.classList.remove('hidden');
                err.classList.add('hidden');
            } else {
                // If Roll not found, hide result box and show error
                box.classList.add('hidden');
                err.classList.remove('hidden');
            }
        }

        // Support for searching on Enter key press
        document.getElementById("rollInput").addEventListener("keydown", (event) => {
            if(event.key === "Enter") searchResult();
        });
    </script>
</body>
</html>
