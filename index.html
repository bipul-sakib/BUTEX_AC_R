<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTEC & NTEC Result System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a1628;
            --navy-mid: #112240;
            --navy-light: #1a3560;
            --accent: #00c6a7;
            --accent-glow: rgba(0,198,167,0.25);
            --accent-dark: #009e85;
            --gold: #f5c842;
            --white: #ffffff;
            --off-white: #e8eef7;
            --muted: #8ea7c5;
            --card-bg: rgba(17, 34, 64, 0.7);
            --border: rgba(0,198,167,0.2);
            --red: #ff5c7a;
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--navy);
            color: var(--off-white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Background mesh ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 10% 20%, rgba(0,198,167,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 90% 80%, rgba(0,90,180,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 50% 50%, rgba(10,22,40,0.8) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }

        /* ── Header ── */
        .site-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logos {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .logo-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--navy-light), var(--navy-mid));
            border: 2.5px solid var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 24px var(--accent-glow), 0 8px 24px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .logo-circle:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 40px var(--accent-glow), 0 16px 32px rgba(0,0,0,0.5);
        }

        .logo-circle img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            border-radius: 50%;
        }

        .logo-abbr {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .logo-divider {
            width: 2px;
            height: 60px;
            background: linear-gradient(to bottom, transparent, var(--accent), transparent);
            border-radius: 2px;
        }

        .site-header h1 {
            font-size: clamp(22px, 4vw, 32px);
            font-weight: 800;
            color: var(--white);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .site-header h1 span {
            color: var(--accent);
        }

        .site-header p {
            margin-top: 8px;
            font-size: 14px;
            color: var(--muted);
            letter-spacing: 0.5px;
        }

        /* ── Search Bar ── */
        .search-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            backdrop-filter: blur(16px);
            margin-bottom: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .search-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .search-row {
            display: flex;
            gap: 12px;
        }

        .search-row input {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(0,198,167,0.25);
            border-radius: var(--radius-sm);
            padding: 13px 18px;
            font-size: 15px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--white);
            outline: none;
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
        }

        .search-row input::placeholder { color: var(--muted); }

        .search-row input:focus {
            border-color: var(--accent);
            background: rgba(0,198,167,0.08);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .search-row button {
            padding: 13px 28px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: var(--navy);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.3px;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0,198,167,0.3);
        }

        .search-row button:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0,198,167,0.4);
        }

        .search-row button:active { transform: translateY(0); }

        /* ── Error ── */
        .error-msg {
            display: none;
            background: rgba(255,92,122,0.12);
            border: 1px solid rgba(255,92,122,0.35);
            color: var(--red);
            border-radius: var(--radius-sm);
            padding: 14px 20px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 24px;
            font-size: 14px;
        }

        /* ── Result Area ── */
        #resultArea {
            display: none;
            animation: fadeUp 0.45s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Profile Card ── */
        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 28px;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 32px;
        }

        .profile-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .profile-item .label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .profile-item .value {
            font-size: 16px;
            font-weight: 600;
            color: var(--white);
        }

        .cgpa-block {
            grid-column: span 2;
            margin-top: 8px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .cgpa-block .cgpa-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .cgpa-block .cgpa-value {
            font-size: 42px;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            text-shadow: 0 0 30px var(--accent-glow);
            font-family: 'JetBrains Mono', monospace;
        }

        .cgpa-block .cgpa-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        /* ── Section header ── */
        .section-head {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .section-head h3 {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .section-head::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Table ── */
        .table-wrap {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            margin-bottom: 32px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: rgba(0,198,167,0.12);
        }

        th {
            padding: 14px 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--accent);
            text-transform: uppercase;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 14px 20px;
            font-size: 15px;
            color: var(--off-white);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        tbody tr:last-child td { border-bottom: none; }

        tbody tr {
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: rgba(0,198,167,0.06);
        }

        td.mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 500;
        }

        td.gpa-good   { color: #4cdb9c; }
        td.gpa-ok     { color: var(--gold); }
        td.gpa-low    { color: var(--red); }

        td.cgpa-col {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.07);
            color: var(--muted);
            font-size: 13px;
        }

        .footer span {
            font-weight: 700;
            color: var(--accent);
        }

        /* ── Responsive ── */
        @media (max-width: 560px) {
            .profile-grid { grid-template-columns: 1fr; }
            .cgpa-block { grid-column: span 1; }
            .search-row { flex-direction: column; }
            .logos { gap: 16px; }
            .logo-divider { width: 60px; height: 2px; }
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <!-- ═══ HEADER ═══ -->
    <header class="site-header">
        <div class="logos">
            <!-- TTEC Logo -->
            <div class="logo-badge">
                <div class="logo-circle">
                    <img src="TTEC.png" alt="TTEC Logo">
                </div>
                <span class="logo-abbr">TTEC</span>
            </div>

            <div class="logo-divider"></div>

            <!-- NTEC Logo -->
            <div class="logo-badge">
                <div class="logo-circle" style="border-color: var(--gold); box-shadow: 0 0 24px rgba(245,200,66,0.2), 0 8px 24px rgba(0,0,0,0.4);">
                    <img src="NTEC.png" alt="NTEC Logo">
                </div>
                <span class="logo-abbr" style="color: var(--gold);">NTEC</span>
            </div>
        </div>

        <h1>Welcome to <span>TTEC & NTEC</span><br>Result System</h1>

    </header>

    <!-- ═══ TOP SEARCH ═══ -->
    <div class="search-box">
        <div class="search-label">🔍 Student Lookup</div>
        <div class="search-row">
            <input type="text" id="rollInputTop" placeholder="Enter Roll Number (e.g. 22070401019)" onkeypress="handleKeyPress(event,'Top')">
            <button onclick="searchResult('Top')">Search</button>
        </div>
    </div>

    <!-- ═══ ERROR ═══ -->
    <div id="errorMsg" class="error-msg">⚠️ Result not found! Please check your Roll Number.</div>

    <!-- ═══ RESULTS ═══ -->
    <div id="resultArea">

        <div class="profile-card">
            <div class="profile-grid">
                <div class="profile-item">
                    <span class="label">Name</span>
                    <span class="value" id="sName">—</span>
                </div>
                <div class="profile-item">
                    <span class="label">Roll Number</span>
                    <span class="value mono" id="sRoll">—</span>
                </div>
                <div class="profile-item">
                    <span class="label">College</span>
                    <span class="value" id="sCollege">—</span>
                </div>
                <div class="profile-item">
                    <span class="label">Department</span>
                    <span class="value" id="sDept">—</span>
                </div>
                <div class="profile-item">
                    <span class="label">Session</span>
                    <span class="value" id="sSession">—</span>
                </div>

                <div class="cgpa-block">
                    <div class="cgpa-label">Cumulative GPA (Latest Term)</div>
                    <div class="cgpa-value" id="sCgpa">—</div>
                    <div class="cgpa-sub" id="sCgpaTerm"></div>
                </div>
            </div>
        </div>

        <div class="section-head">
            <h3>Term Results</h3>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Term</th>
                        <th>GPA</th>
                        <th>CGPA</th>
                    </tr>
                </thead>
                <tbody id="regularTbody"></tbody>
            </table>
        </div>

    </div>

    <div class="footer">
        Developed &amp; Maintained by <span>Sakib Hasan Bipul</span>
    </div>

</div>

<script>
    let studentData = {};

    fetch('data.json')
        .then(r => r.json())
        .then(data => { studentData = data; })
        .catch(() => console.error("Failed to load data.json"));

    function handleKeyPress(e, suffix) {
        if (e.key === 'Enter') searchResult(suffix);
    }

    // Format term key "L1T1" → "Level 1 Term 1", "LXTX" → "Clearance"
    function formatTerm(key) {
        if (!key) return key;
        if (/^LXTX$/i.test(key)) return 'Clearance';
        return key.replace(/L(\d+)T(\d+)/i, (_, l, t) => `Level ${l} Term ${t}`);
    }

    // Term sort order: regular L#T# first sorted, then LXTX/unknown at end
    function termSortKey(key) {
        const m = key.match(/^L(\d+)T(\d+)$/i);
        if (m) return parseInt(m[1]) * 100 + parseInt(m[2]);
        return 9999;
    }

    // GPA color class
    function gpaClass(v) {
        if (v >= 3.5) return 'gpa-good';
        if (v >= 2.5) return 'gpa-ok';
        return 'gpa-low';
    }

    function searchResult(suffix) {
        const input = document.getElementById('rollInput' + suffix);
        const roll = input.value.trim().toUpperCase();
        const resultArea = document.getElementById('resultArea');
        const errorMsg = document.getElementById('errorMsg');

        if (!roll) { alert("Please enter a Roll Number"); return; }

        const student = studentData[roll];

        if (student) {
            errorMsg.style.display = 'none';
            resultArea.style.display = 'block';

            document.getElementById('sName').textContent    = student.name    || 'Unknown';
            document.getElementById('sRoll').textContent    = roll;
            document.getElementById('sCollege').textContent = student.college  || 'Unknown';
            document.getElementById('sDept').textContent    = student.dept     || 'Unknown';
            document.getElementById('sSession').textContent = student.batch    || student.session || 'Unknown';

            const tbody = document.getElementById('regularTbody');
            tbody.innerHTML = '';

            // --- Build unified row list ---
            // Each row: { term, gpa, isRetake }
            const allRows = [];

            // Add regular results
            if (student.results) {
                Object.entries(student.results).forEach(([term, gpa]) => {
                    allRows.push({ term, gpa, isRetake: false });
                });
            }

            // Add retakes
            if (student.retakes && student.retakes.length > 0) {
                student.retakes.forEach(r => {
                    if (r.gpa > 0) { // skip 0.0 GPA retakes (failed/no result)
                        allRows.push({ term: r.term, gpa: r.gpa, isRetake: true });
                    }
                });
            }

            // Sort all rows by term order, retakes after regulars within same term
            allRows.sort((a, b) => {
                const ka = termSortKey(a.term);
                const kb = termSortKey(b.term);
                if (ka !== kb) return ka - kb;
                // same term: regular first, retake after
                return (a.isRetake ? 1 : 0) - (b.isRetake ? 1 : 0);
            });

            // Compute running CGPA across all rows
            let totalGpa = 0;
            allRows.forEach((row, i) => {
                totalGpa += row.gpa;
                row.cgpa = totalGpa / (i + 1);
            });

            // Render rows
            allRows.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${formatTerm(row.term)}</td>
                    <td class="mono ${gpaClass(row.gpa)}">${row.gpa.toFixed(2)}</td>
                    <td class="cgpa-col">${row.cgpa.toFixed(2)}</td>`;
                tbody.appendChild(tr);
            });

            // Hero CGPA — use stored cgpa from data.json (authoritative final value)
            const finalCgpa = student.cgpa || 0;
            document.getElementById('sCgpa').textContent = finalCgpa.toFixed(2);

            // Subtitle: last term label
            if (allRows.length > 0) {
                const lastRow = allRows[allRows.length - 1];
                document.getElementById('sCgpaTerm').textContent = `After ${formatTerm(lastRow.term)}`;
            } else {
                document.getElementById('sCgpaTerm').textContent = '';
            }

            resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

        } else {
            errorMsg.style.display = 'block';
            resultArea.style.display = 'none';
            errorMsg.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }
</script>

</body>
</html>
