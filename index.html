<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTEX Affiliated Result & Ranking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .gradient-text { background: linear-gradient(90deg, #1e40af, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen py-10 px-4">

    <div class="max-w-4xl mx-auto">
        
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold gradient-text mb-2">Result & Ranking Portal</h1>
            <p class="text-slate-600 font-medium">Affiliated Colleges of BUTEX</p>
        </div>

        <div class="glass-card p-6 rounded-3xl shadow-xl mb-10">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="rollInput" placeholder="Enter Roll Number (e.g. 2207...)" 
                    class="flex-1 px-6 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all text-lg font-semibold">
                <button onclick="searchResult()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-2xl font-bold transition-all shadow-lg shadow-blue-200 active:scale-95">
                    Search Now
                </button>
            </div>
        </div>

        <div id="resultBox" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
            
            <div class="glass-card rounded-3xl shadow-2xl overflow-hidden mb-6">
                <div class="bg-blue-600 p-8 text-white">
                    <div class="flex justify-between items-start">
                        <div>
                            <h2 id="dispName" class="text-3xl font-bold mb-1 uppercase tracking-tight">---</h2>
                            <p id="dispRoll" class="text-blue-100 font-mono text-lg tracking-widest opacity-90"></p>
                        </div>
                        <div class="text-right">
                            <span class="bg-white/20 px-4 py-2 rounded-lg text-sm font-bold backdrop-blur-sm" id="dispBatch">Batch --</span>
                        </div>
                    </div>
                </div>

                <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <div class="flex items-center gap-3">
                            <div class="p-3 bg-blue-50 rounded-xl text-blue-600">🏛️</div>
                            <div>
                                <p class="text-xs text-slate-500 uppercase font-bold tracking-wider">College</p>
                                <p id="dispCollege" class="font-bold text-slate-800">---</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="p-3 bg-purple-50 rounded-xl text-purple-600">🧬</div>
                            <div>
                                <p class="text-xs text-slate-500 uppercase font-bold tracking-wider">Department</p>
                                <p id="dispDept" class="font-bold text-slate-800">---</p>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gradient-to-br from-blue-50 to-indigo-50 p-5 rounded-2xl border border-blue-100">
                            <p class="text-xs text-blue-600 uppercase font-bold mb-1">College Rank</p>
                            <p id="dispCRank" class="text-3xl font-black text-blue-900">#--</p>
                        </div>
                        <div class="bg-gradient-to-br from-emerald-50 to-teal-50 p-5 rounded-2xl border border-emerald-100">
                            <p class="text-xs text-emerald-600 uppercase font-bold mb-1">Dept. Rank</p>
                            <p id="dispDRank" class="text-3xl font-black text-emerald-900">#--</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-3xl shadow-xl overflow-hidden">
                <table class="w-full">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs uppercase font-bold tracking-widest border-b border-slate-100">
                            <th class="px-8 py-4 text-left">Level & Term</th>
                            <th class="px-8 py-4 text-center">GPA</th>
                            <th class="px-8 py-4 text-right">Status</th>
                        </tr>
                    </thead>
                    <tbody id="resTableBody" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="errorMsg" class="hidden text-center mt-10">
            <div class="bg-red-50 text-red-600 inline-block px-8 py-4 rounded-2xl font-bold border border-red-100">
                ⚠️ Result not found in our database!
            </div>
        </div>
    </div>

    <script>
        let db = {};

        // Fetch the data generated by bot.py
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                db = data;
                console.log("Database synced successfully.");
            });

        function searchResult() {
            const roll = document.getElementById('rollInput').value.trim().toUpperCase();
            const box = document.getElementById('resultBox');
            const err = document.getElementById('errorMsg');
            const tbody = document.getElementById('resTableBody');

            if (db[roll]) {
                const s = db[roll];
                
                // Update Profile
                document.getElementById('dispName').innerText = s.name || "Unknown";
                document.getElementById('dispRoll').innerText = roll;
                document.getElementById('dispBatch').innerText = "Batch " + (s.batch || "--");
                document.getElementById('dispCollege').innerText = s.college;
                document.getElementById('dispDept').innerText = s.dept + " Engineering";
                
                // Update Ranks
                document.getElementById('dispCRank').innerText = "#" + (s.college_rank || "--");
                document.getElementById('dispDRank').innerText = "#" + (s.dept_rank || "--");

                // Clear & Fill Table
                tbody.innerHTML = "";
                const results = s.results;
                for (let term in results) {
                    const row = `
                        <tr class="hover:bg-blue-50/50 transition-colors">
                            <td class="px-8 py-5 font-bold text-slate-700">${term}</td>
                            <td class="px-8 py-5 text-center">
                                <span class="text-xl font-black text-blue-600">${results[term].toFixed(2)}</span>
                            </td>
                            <td class="px-8 py-5 text-right">
                                <span class="px-3 py-1 bg-green-100 text-green-700 text-xs font-black rounded-full uppercase tracking-tighter">Passed</span>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                }

                box.classList.remove('hidden');
                err.classList.add('hidden');
            } else {
                box.classList.add('hidden');
                err.classList.remove('hidden');
            }
        }

        // Enter key support
        document.getElementById("rollInput").addEventListener("keydown", (e) => {
            if (e.key === "Enter") searchResult();
        });
    </script>
</body>
</html>
